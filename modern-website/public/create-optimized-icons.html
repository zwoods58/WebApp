<!DOCTYPE html>
<html>
<head>
    <title>Create Optimized Icons</title>
</head>
<body>
    <h1>Creating Optimized BeeZee Icons...</h1>
    <div id="status"></div>
    
    <script>
        const iconSizes = [
            { size: 72, maskable: false },
            { size: 96, maskable: false },
            { size: 128, maskable: false },
            { size: 144, maskable: false },
            { size: 152, maskable: false },
            { size: 192, maskable: true },
            { size: 384, maskable: false },
            { size: 512, maskable: true }
        ];

        function createOptimizedIcon(size, isMaskable) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = size;
                canvas.height = size;
                
                // Calculate dimensions
                const padding = isMaskable ? Math.floor(size * 0.15) : Math.floor(size * 0.2);
                const logoSize = isMaskable ? Math.floor(size * 0.7) : Math.floor(size * 0.6);
                const borderRadius = Math.floor(size * 0.2);
                
                // Draw black background with rounded corners
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.roundRect(0, 0, size, size, borderRadius);
                ctx.fill();
                
                // Load and draw logo
                const img = new Image();
                img.onload = function() {
                    // Draw logo centered with proper scaling
                    const x = (size - logoSize) / 2;
                    const y = (size - logoSize) / 2;
                    ctx.drawImage(img, x, y, logoSize, logoSize);
                    
                    // Convert to blob and create download link
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `beezee-icon-${size}x${size}.png`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        resolve();
                    }, 'image/png');
                };
                img.src = './beezee-icon-512x512.png';
            });
        }

        async function generateAllIcons() {
            const status = document.getElementById('status');
            
            for (let i = 0; i < iconSizes.length; i++) {
                const { size, maskable } = iconSizes[i];
                status.innerHTML = `Creating ${size}x${size} ${maskable ? 'maskable' : 'standard'} icon...`;
                await createOptimizedIcon(size, maskable);
                await new Promise(resolve => setTimeout(resolve, 500)); // Small delay between downloads
            }
            
            status.innerHTML = '✅ All optimized icons created successfully!';
        }

        // Auto-start generation
        window.addEventListener('load', generateAllIcons);
    </script>
</body>
</html>
