<!DOCTYPE html>
<html>
<head>
    <title>Plans API Test</title>
</head>
<body>
    <h1>Plans API Test</h1>
    <div id="results"></div>
    
    <script>
    async function testPlansAPI() {
        console.log('=== Testing Plans API ===');
        const results = document.getElementById('results');
        
        try {
            // Test 1: Get all plans
            console.log('\n1. Testing GET /api/kyshi/plans');
            const allPlansResponse = await fetch('/api/kyshi/plans');
            const allPlansData = await allPlansResponse.json();
            
            console.log('Status:', allPlansResponse.status);
            console.log('Response:', allPlansData);
            
            let output = '<h2>Test Results</h2>';
            
            if (allPlansData.success && Array.isArray(allPlansData.plans)) {
                output += `<p>SUCCESS: Retrieved ${allPlansData.plans.length} plans</p>`;
                output += '<h3>All Plans:</h3><ul>';
                allPlansData.plans.forEach(plan => {
                    output += `<li>${plan.country_code}: ${plan.name} - ${plan.amount} ${plan.localCurrency}</li>`;
                });
                output += '</ul>';
            } else {
                output += '<p>FAILED: Unexpected response format</p>';
            }
            
            // Test 2: Get Kenya plans only
            console.log('\n2. Testing GET /api/kyshi/plans?country=KE');
            const kenyaPlansResponse = await fetch('/api/kyshi/plans?country=KE');
            const kenyaPlansData = await kenyaPlansResponse.json();
            
            console.log('Status:', kenyaPlansResponse.status);
            console.log('Response:', kenyaPlansData);
            
            if (kenyaPlansData.success && Array.isArray(kenyaPlansData.plans)) {
                output += `<h3>Kenya Plans (${kenyaPlansData.plans.length}):</h3><ul>`;
                kenyaPlansData.plans.forEach(plan => {
                    output += `<li>${plan.name} - ${plan.amount} ${plan.localCurrency}</li>`;
                });
                output += '</ul>';
            } else {
                output += '<p>FAILED: Kenya plans test</p>';
            }
            
            // Test 3: Test SubscriptionAPI simulation
            console.log('\n3. Testing SubscriptionAPI simulation');
            
            class TestSubscriptionAPI {
                static baseUrl = '/api/kyshi';
                
                static async getPlans(countryCode) {
                    const url = countryCode 
                        ? `${this.baseUrl}/plans?country=${countryCode}` 
                        : `${this.baseUrl}/plans`;
                        
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    
                    console.log('Plans API response:', data);
                    
                    let plansArray = [];
                    
                    if (data.success && Array.isArray(data.plans)) {
                        plansArray = data.plans;
                        console.log(`Retrieved ${plansArray.length} plans from success.plans format`);
                    } else if (Array.isArray(data)) {
                        plansArray = data;
                        console.log(`Retrieved ${plansArray.length} plans from direct array format`);
                    } else if (data.data && Array.isArray(data.data)) {
                        plansArray = data.data;
                        console.log(`Retrieved ${plansArray.length} plans from data.data format`);
                    } else if (data.plans && Array.isArray(data.plans)) {
                        plansArray = data.plans;
                        console.log(`Retrieved ${plansArray.length} plans from plans field`);
                    } else {
                        console.error('Unexpected plans response format:', data);
                        throw new Error('Invalid plans response format');
                    }
                    
                    return plansArray;
                }
            }
            
            const kenyaPlans = await TestSubscriptionAPI.getPlans('KE');
            output += `<h3>SubscriptionAPI Test: SUCCESS - Found ${kenyaPlans.length} Kenya plans</h3>`;
            
            // Test 4: Plan ID lookup
            console.log('\n4. Testing plan ID lookup');
            const kenyaPlan = kenyaPlans.find(p => p.country_code === 'KE');
            if (kenyaPlan) {
                output += `<h3>Plan ID Lookup: SUCCESS</h3>`;
                output += `<p>Kenya Plan ID: ${kenyaPlan.id}</p>`;
                output += `<p>Plan Details: ${kenyaPlan.name} - ${kenyaPlan.amount} ${kenyaPlan.localCurrency}</p>`;
            } else {
                output += '<p>FAILED: No Kenya plan found</p>';
            }
            
            results.innerHTML = output;
            console.log('=== All Tests Completed ===');
            
        } catch (error) {
            console.error('Test failed:', error);
            results.innerHTML = `<p style="color: red;">Test failed: ${error.message}</p>`;
        }
    }
    
    // Run test when page loads
    testPlansAPI();
    </script>
</body>
</html>
